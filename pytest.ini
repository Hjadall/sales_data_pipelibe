[pytest]
# Pytest configuration for local and Databricks testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Show extra test summary info
addopts = -ra --strict-markers --tb=short

# Markers for test categorization
markers =
    unit: Unit tests that don't require Spark/Databricks
    integration: Integration tests requiring Spark
    dlt: Tests for DLT transformations
    slow: Tests that take longer to run

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Ignore certain directories
norecursedirs = .git .venv venv __pycache__ .pytest_cache fixtures

# Verbosity
console_output_style = progress

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
